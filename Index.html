<!DOCTYPE html>
<html>
<head>
<title>Birthday.exe</title>

<style>
body {
    background-color: black;
    color: #00ff00;
    font-family: monospace; 
    text-align: center;
    padding-top: 100px;
}

button {
    background-color: black;
    color: #00ff00;
    border: 1px solid #00ff00;
    padding:10px 20px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background-color: #00ff00;
    color: black;
}
</style>
</head>

<body> 

<div id="start">
    <h1>System Alert: Birthday.exe wurde gestartet</h1>
    <p>Willkommen im System... 🎂</p>
    <button onclick="startProgram()">Programm starten</button>
</div>

<div id="password" style="display:none;">
    <h1>Zugriff erforderlich</h1>
    <p>Bitte gib das richtige Passwort ein:</p>

    <input type="text" id="inputPw">
    <br><br>
    <button onclick="checkPassword()">Bestätigen</button>
    <p id="error" style="color:red;"></p>
</div>

<div id="level2" style="display:none;">
    <h1>Systemprüfung läuft... 🧠</h1>
    <p>Frage 1: Wo war unser erstes Date?</p>

    <button onclick="answer1('falsch')">Autohaus</button><br><br>
    <button onclick="answer1('richtig')">Kino Mühldorf</button><br><br>
    <button onclick="answer1('falsch')">Kino</button>

    <p id="result1"></p>
</div>

<div id="level3" style="display:none;">
    <h1>Weitere Überprüfung erforderlich... 🧠</h1>
    <p>Was war witzig bei unserem ersten Date? 😂</p>

    <button onclick="answer2('falsch')">Du warst zu spät</button><br><br>
    <button onclick="answer2('richtig')">Falsch abgebogen</button><br><br>
    <button onclick="answer2('falsch')">Aufregung</button>

    <p id="result2"></p>
    <p id="hint" style="color:yellow;"></p>
</div>

<script>
function startProgram() {
    document.getElementById("start").style.display = "none";
    document.getElementById("password").style.display = "block";
}

function checkPassword() {
    var pw = document.getElementById("inputPw").value;

    if (pw === "18032015") {
        document.getElementById("password").style.display = "none";
        document.getElementById("level2").style.display = "block";
    } else { 
        document.getElementById("error").innerText = "Falsches Passwort 😜";
    }
}

function answer1(answer) {
    if(answer === "richtig") {
        document.getElementById("result1").innerText = "Richtig 😍";

        setTimeout(function() {
            document.getElementById("level2").style.display = "none";
            document.getElementById("level3").style.display = "block";
        }, 1000);

    } else {
        document.getElementById("result1").innerText = "Falsch 😜 Versuch nochmal!";
    }
}

function answer2(answer) {
    if(answer === "richtig") {
        document.getElementById("result2").innerText = "Natürlich 😂❤️";
        document.getElementById("hint").innerText = "";
    } else {
        document.getElementById("result2").innerText = "Nicht ganz ☺️";
        document.getElementById("hint").innerText = "Hinweis: Autobahnabfahrt Mühldorf 🚗";
    }
}
</script>

</body>
</html>
